apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
data:
  config.ini: |
    [InsightFinder]
    user_name = {{ .Values.insightfinder.user_name }}
    license_key = {{ .Values.insightfinder.license_key }}
    project_name = {{ .Values.insightfinder.project_name }}
    server_url = {{ .Values.insightfinder.server_url }}

    [agent]
    # IF System to monitor
    url = {{ .Values.agent.url }}
    genai_url = {{ .Values.agent.genai_url }}
    genaichat_url = {{ .Values.agent.genaichat_url }}
    llmjudge_url = {{ .Values.agent.llmjudge_url }}

    login_user = {{ .Values.agent.login_user }}
    login_pass = {{ .Values.agent.login_pass }}

    # Incident Summary and Recommendation LLM parameters
    system_name = {{ .Values.agent.system_name }}
    customer_name = {{ .Values.agent.customer_name }}
    root_cause_chain_size = {{ .Values.agent.root_cause_chain_size }}
    root_cause_entry = {{ .Values.agent.root_cause_entry }}

    # URLs for each of the API endpoints
    monitor_urls = {{ .Values.agent.monitor_urls | toJson }}
