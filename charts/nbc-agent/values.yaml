kafka:
  broker: "kafka-controller-headless.insightfinder:9092"
  compression: "snappy"
  retry_max: 3
  required_acks: -1
  timeout: 30s

# Redis configuration for distributed metrics
redis:
  enabled: true
  addr: "redis-cluster.insightfinder.svc.cluster.local:6379"
  password: ""
  db: 0
  prefix: "nbcredisdev"  # Environment prefix (nbcredisdev, nbcredisstage, nbcredisprod) - prevents key collisions

receiver:
  replicaCount: 3
  image:
    repository: insightfinderinc/nbc-data-receiver
    pullPolicy: Always
    tag: "main"
  imagePullSecrets:
    - name: regcred
  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}

  resources:
    limits:
      cpu: "1"
      memory: 512Mi
    requests:
      cpu: "1"
      memory: 256Mi
  
  nodeSelector: {}
  tolerations: []
  affinity: {}
  volumeMounts: []
  volumes: []
  env: []

  ingress:
    enabled: true
    className: "nginx"
    annotations: {}
    host: "nbc-receiver-stg.insightfinder.com"
    path: "/"
    pathType: "Prefix"
    tls: []
    servicePort:
      name: "http"

  config:
    server:
      read_timeout: 30s
      write_timeout: 30s
    
    logging:
      level: "info"
      development: false
      disable_stacktrace: true

    auth:
      enabled: true
      # API key for inter-agent communication (data-processor -> data-receiver)
      # This should match the reporting_api_key in processor.metrics
      inter_agent_api_key: "receiver-processor-shared-api-key"
      allowed_users:
        nbc_stg_user:
          username: "maoyuwang"
          license_key: "595bf1a9253e982b0e3951a1d8ba634fdae19cb3"

processor:
  replicaCount: 3
  image:
    repository: insightfinderinc/nbc-data-processor
    pullPolicy: Always
    tag: "main"
  imagePullSecrets:
    - name: regcred
  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}

  resources:
    limits:
      cpu: "1"
      memory: 512Mi
    requests:
      cpu: "1"
      memory: 256Mi
  
  nodeSelector: {}
  tolerations: []
  affinity: {}
  volumeMounts: []
  volumes: []
  env: []
  
  data_sources:
    enabled:
      - "Harmonic"
      - "Conviva"
      - "Touchstream"
      - "Thanos"
    configs:
      default:
        # Data source identifier (will be dynamically set from the payload's source field)
        source_name: "DEFAULT"

        # Instance identifier field
        instance_field: "alert.core.monitored_item"
        # Default instance if instance_field cannot be extracted
        default_instance: "UNKNOWN"

        component_field: "DATASOURCENAME + alert.additional_fields.product + alert.core.proposition + alert.asset.stream_type"
        default_component: "UNKNOWN"

        # Timestamp field to extract (use alert.core.timestamp which contains the actual timestamp)
        timestamp_field: "alert.metadata.received_at"

        # Optional timezone of the timestamp (if TZ naive)
        timestamp_timezone: "UTC"

        # InsightFinder configuration
        insightfinder:
          user_name: "maoyuwang"
          license_key: "595bf1a9253e982b0e3951a1d8ba634fdae19cb3"
          token: ""
          project_name: "default-project"  # Will be dynamically set to the source field from payload
          system_name: "maoyu-test-nbc-agent"
          project_type: "log"
          containerize: false
          sampling_interval: 900
          run_interval: 900
          chunk_size_kb: 2048
          if_url: "https://stg.insightfinder.com"
          if_http_proxy: ""
          if_https_proxy: ""
          collector_type: "logfilereplay"

      Conviva:
        # Data source identifier
        source_name: Conviva

        # Instance identifier field
        instance_field: "alert.core.monitored_item"
        # Default instance if instance_field cannot be extracted
        default_instance: "Conviva"

        # Component field mapping (optional)
        component_field: "DATASOURCENAME + alert.additional_fields.product + alert.core.proposition + alert.asset.stream_type"
        default_component: ""

        # Timestamp field to extract (use alert.core.timestamp which contains the actual timestamp)
        timestamp_field: "alert.metadata.received_at"

        # Optional timezone of the timestamp (if TZ naive)
        timestamp_timezone: "America/New_York"

        # InsightFinder configuration
        insightfinder:
          user_name: "maoyuwang"
          license_key: "595bf1a9253e982b0e3951a1d8ba634fdae19cb3"
          token: ""
          project_name: "maoyu-test-nbc-agent-conviva"
          system_name: "maoyu-test-nbc-agent"
          project_type: "log"
          containerize: false
          sampling_interval: 10
