receiver:
  replicaCount: 3
  
  image:
    repository: insightfinderinc/nbc-data-receiver
    pullPolicy: Always
    tag: "main"
  
  imagePullSecrets:
    - name: regcred
  
  podAnnotations: {}
  
  podSecurityContext: {}
  
  securityContext: {}
  
  resources:
    limits:
      cpu: "1"
      memory: 512Mi
    requests:
      cpu: "1"
      memory: 256Mi
  
  nodeSelector: {}
  
  tolerations: []
  
  affinity: {}
  
  volumeMounts: []
  
  volumes: []
  
  env: []
    # - name: ENV_VAR_NAME
    #   value: "value"

  ingress:
    enabled: false
    className: ""
    annotations: {}
    host: ""
    path: "/"
    pathType: "Prefix"
    tls: []
    servicePort:
      name: "http"

  config:
    server:
      read_timeout: 30s
      write_timeout: 30s
    
    kafka:
      broker: "kafka-controller-headless.insightfinder:9092"
      topic: "data-events"
      compression: "snappy"
      retry_max: 3
      required_acks: -1
      timeout: 10s
    
    logging:
      level: "info"
      development: false
      disable_stacktrace: true