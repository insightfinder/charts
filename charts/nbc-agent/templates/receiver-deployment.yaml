apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nbc-agent.fullname" . }}-receiver
  labels:
    {{- include "nbc-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: receiver
spec:
  replicas: {{ .Values.receiver.replicaCount }}
  selector:
    matchLabels:
      {{- include "nbc-agent.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: receiver
  template:
    metadata:
      {{- with .Values.receiver.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "nbc-agent.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: receiver
    spec:
      {{- with .Values.receiver.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.receiver.podSecurityContext | nindent 8 }}
      containers:
        - name: receiver
          securityContext:
            {{- toYaml .Values.receiver.securityContext | nindent 12 }}
          image: "{{ .Values.receiver.image.repository }}:{{ .Values.receiver.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.receiver.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.receiver.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /root/config/config.yaml
              subPath: receiver-config.yml
            {{- with .Values.receiver.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.receiver.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "nbc-agent.fullname" . }}-receiver-config
        {{- with .Values.receiver.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.receiver.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.receiver.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.receiver.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}